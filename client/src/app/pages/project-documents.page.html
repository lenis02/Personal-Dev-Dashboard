<div class="flex-1 p-8 overflow-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-bold text-gray-800">프로젝트 문서 템플릿</h2>
      <p class="text-sm text-gray-500 mt-1">프로젝트 생성 시 자동으로 생성된 문서를 관리합니다.</p>
    </div>
    <a
      [routerLink]="['/projects']"
      class="px-3 py-2 text-sm font-bold border border-gray-300 bg-white hover:bg-gray-50 cursor-pointer"
    >
      프로젝트 목록으로
    </a>
  </div>

  <div *ngIf="documents.length === 0" class="text-sm text-gray-400">
    문서를 불러오는 중이거나 생성된 문서가 없습니다.
  </div>

  <div *ngIf="documents.length > 0" class="grid grid-cols-12 gap-6">
    <div class="col-span-3">
      <div class="bg-white/90 border border-gray-100 shadow-sm p-3 space-y-2">
        <button
          *ngFor="let doc of documents"
          (click)="selectDoc(doc.id)"
          class="w-full text-left px-3 py-2 border border-gray-200 bg-white hover:bg-indigo-50 cursor-pointer text-sm font-semibold"
          [ngClass]="{ 'bg-indigo-50 border-indigo-300 text-indigo-700': selectedDocId === doc.id }"
        >
          {{ doc.title }}
        </button>
      </div>
    </div>

    <div class="col-span-9" *ngIf="selectedDoc as doc">
      <div class="bg-white/90 border border-gray-100 shadow-sm p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-gray-800">{{ doc.title }}</h3>
          <button
            (click)="saveDocument(doc)"
            class="px-3 py-2 text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:opacity-90 cursor-pointer"
          >
            저장
          </button>
        </div>

        <textarea
          [(ngModel)]="doc.content"
          (ngModelChange)="updatePreview(doc.content)"
          rows="12"
          class="w-full px-4 py-3 border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-500 mb-4"
        ></textarea>

        <div *ngIf="doc.docType === 'ERD'" class="space-y-3 mb-4">
          <input
            type="url"
            [(ngModel)]="doc.imageUrl"
            placeholder="ERD 이미지 URL 입력 (예: https://...)"
            class="w-full px-4 py-2 border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-500"
          />
          <img *ngIf="doc.imageUrl" [src]="doc.imageUrl" alt="ERD Preview" class="max-h-80 border border-gray-200" />
        </div>
      </div>

      <div class="bg-white/90 border border-gray-100 shadow-sm p-6">
        <h4 class="text-sm font-bold text-gray-700 mb-3">Markdown Preview</h4>
        <div class="markdown-preview text-sm text-gray-700" [innerHTML]="markdownPreview"></div>
      </div>
    </div>
  </div>
</div>
