<div
  *ngIf="!authService.isLoggedIn() && !isAuthCallbackRoute()"
  class="min-h-screen flex items-center justify-center bg-gray-100"
>
  <div
    class="max-w-md w-full p-8 bg-white rounded-2xl shadow-xl text-center border border-gray-100"
  >
    <div class="text-4xl mb-4">🚀</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">프리랜서 대시보드</h1>
    <p class="text-gray-500 mb-8 text-sm">
      업무 효율을 높이는 나만의 공간입니다.<br />로그인하고 시작해 보세요.
    </p>
    <button
      (click)="loginWithGoogle()"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-md"
    >
      Google로 시작하기
    </button>
    <button
      (click)="loginWithKakao()"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-md"
    >
      카카오로 시작하기
    </button>
  </div>
</div>

<div
  *ngIf="!authService.isLoggedIn() && isAuthCallbackRoute()"
  class="min-h-screen flex items-center justify-center bg-gray-100"
>
  <router-outlet></router-outlet>
</div>

<div
  *ngIf="authService.isLoggedIn()"
  class="flex h-screen bg-gray-50 font-sans overflow-hidden"
>
  <aside
    class="w-64 bg-white shadow-[1px_0_10px_rgba(0,0,0,0.05)] flex flex-col z-10"
  >
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-2xl font-black text-indigo-600 tracking-tight">
        🚀 Selu Dash
      </h1>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a
        [routerLink]="['/dashboard']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition"
      >
        <span>📊</span> 대시보드
      </a>
      <a
        [routerLink]="['/clients']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition"
      >
        <span>🤝</span> 클라이언트
      </a>
      <a
        [routerLink]="['/projects']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition"
      >
        <span>📂</span> 프로젝트
      </a>
      <a
        [routerLink]="['/tasks']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition"
      >
        <span>✅</span> 할 일 (Tasks)
      </a>
    </nav>

    <div class="p-4 border-t border-gray-100">
      <button
        (click)="logout()"
        class="w-full px-4 py-2.5 text-sm text-gray-500 font-medium hover:bg-red-50 hover:text-red-600 rounded-xl transition"
      >
        로그아웃
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden relative">
    <header
      class="bg-white/80 backdrop-blur-md shadow-sm p-6 flex justify-between items-center z-10"
    >
      <h2 class="text-xl font-bold text-gray-800">관리 대시보드</h2>
      <div class="flex items-center gap-4">
        <span
          class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full"
          >개발자 모드 👨‍💻</span
        >
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
