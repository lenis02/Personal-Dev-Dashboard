<div class="min-h-screen bg-slate-950 p-6 flex flex-col items-center font-sans">
  <div class="w-full max-w-4xl space-y-8">
    <section
      class="bg-gradient-to-br from-slate-900 to-slate-800 p-8 border border-indigo-500/30 shadow-[0_0_40px_-10px_rgba(99,102,241,0.3)]"
    >
      <div class="flex justify-between items-start">
        <div class="w-2/3">
          <p class="text-indigo-400 font-bold tracking-wider mb-2 text-sm">
            CURRENT TIER
          </p>
          <h1
            class="text-4xl font-black text-white tracking-tight drop-shadow-md"
          >
            {{ userTier() }}
          </h1>

          <p class="mt-5 text-slate-400 font-medium text-lg">
            다음 등급까지
            <span class="text-indigo-400 font-bold text-2xl px-1"
              >{{ remainingSbd() }}kg</span
            >
            남았습니다. 득근하세요! 🔥
          </p>

          <div class="mt-10 w-full pr-4">
            <div class="flex justify-between items-end mb-3">
              <span class="text-sm font-bold text-slate-300 tracking-wider"
                >NEXT TIER GAUGE</span
              >
              <span class="text-2xl font-black text-indigo-400 italic"
                >{{ progressPercentage() }}%</span
              >
            </div>

            <div
              class="h-8 w-full bg-slate-950/80 overflow-hidden shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] border border-slate-700/70"
            >
              <div
                class="h-full bg-linear-to-r from-indigo-600 via-purple-500 to-pink-500 transition-all duration-1000 ease-out relative shadow-[0_0_25px_rgba(168,85,247,0.5)]"
                [style.width.%]="progressPercentage()"
              >
                <div
                  class="absolute top-0 left-0 right-0 h-1/3 bg-white/20"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div
          class="bg-indigo-900/40 border border-indigo-500/30 px-6 py-4 text-center backdrop-blur-sm"
        >
          <p class="text-indigo-300 text-xs font-bold tracking-widest mb-1">
            TOTAL SBD
          </p>
          <p class="text-4xl font-black text-white">
            {{ totalSBD() }}<span
              class="text-lg text-indigo-200 font-medium ml-1"
              >kg</span
            >
          </p>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-3 gap-6">
      <div
        class="bg-slate-900 p-6 border border-slate-800 shadow-xl flex flex-col items-center justify-center relative overflow-hidden group hover:border-indigo-500/50 hover:bg-slate-800/80 transition-all duration-300"
      >
        <div
          class="absolute -right-2 -top-2 text-8xl opacity-5 group-hover:scale-110 transition-transform duration-300"
        >
          🏋️
        </div>
        <p
          class="text-slate-500 font-bold tracking-widest text-sm mb-3 relative z-10"
        >
          SQUAT
        </p>
        <p class="text-4xl font-black text-white relative z-10">
          {{ user().squat }}<span
            class="text-xl text-slate-400 font-medium ml-1"
            >kg</span
          >
        </p>
      </div>

      <div
        class="bg-slate-900 p-6 border border-slate-800 shadow-xl flex flex-col items-center justify-center relative overflow-hidden group hover:border-indigo-500/50 hover:bg-slate-800/80 transition-all duration-300"
      >
        <div
          class="absolute -right-2 -top-2 text-8xl opacity-5 group-hover:scale-110 transition-transform duration-300"
        >
          🛏️
        </div>
        <p
          class="text-slate-500 font-bold tracking-widest text-sm mb-3 relative z-10"
        >
          BENCH
        </p>
        <p class="text-4xl font-black text-white relative z-10">
          {{ user().bench }}<span
            class="text-xl text-slate-400 font-medium ml-1"
            >kg</span
          >
        </p>
      </div>

      <div
        class="bg-slate-900 p-6 border border-slate-800 shadow-xl flex flex-col items-center justify-center relative overflow-hidden group hover:border-indigo-500/50 hover:bg-slate-800/80 transition-all duration-300"
      >
        <div
          class="absolute -right-2 -top-2 text-8xl opacity-5 group-hover:scale-110 transition-transform duration-300"
        >
          💀
        </div>
        <p
          class="text-slate-500 font-bold tracking-widest text-sm mb-3 relative z-10"
        >
          DEAD
        </p>
        <p class="text-4xl font-black text-white relative z-10">
          {{ user().deadlift }}<span
            class="text-xl text-slate-400 font-medium ml-1"
            >kg</span
          >
        </p>
      </div>
    </section>
  </div>
</div>
